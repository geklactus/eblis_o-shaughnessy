---
# ============================================================================
# Inventory: GitLab Runner Hosts
# ============================================================================
# Update the host entry below with your VM's current reachable address
# (or hostname). After the network role applies the static IP, future runs
# should use the static IP defined in group_vars/all.yml.
# ============================================================================

all:
  children:
    gitlab_runners:
      hosts:
        gitlab-runner-01:
          # ── Set this to the VM's current reachable address ──
          ansible_host: "192.168.1.100"          # CHANGE ME
          ansible_user: "ansible"                 # CHANGE ME
          ansible_become: true
          ansible_become_method: sudo
          # ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
