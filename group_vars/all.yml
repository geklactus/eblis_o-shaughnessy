---
# ============================================================================
# group_vars/all.yml  –  Central Configuration
# ============================================================================
# Fill in every value marked "CHANGE ME" before running the playbook.
# Sensitive values (tokens, passwords) can alternatively be passed at
# runtime with --extra-vars or stored in Ansible Vault.
# ============================================================================


# ── GitLab Connection ────────────────────────────────────────────────────────
gitlab_url: "https://gitlab.example.com"         # CHANGE ME - your GitLab instance URL
gitlab_runner_token: "CHANGE_ME"                  # CHANGE ME - runner registration token
gitlab_runner_name: "{{ ansible_hostname }}"
gitlab_runner_description: "RHEL 10 Docker Runner on ESX"
gitlab_runner_tags: "docker,rhel10,esx"           # comma-separated tags
gitlab_runner_executor: "docker"
gitlab_runner_docker_image: "alpine:latest"       # default image for jobs
gitlab_runner_concurrent: 4                       # max concurrent jobs
gitlab_runner_check_interval: 3                   # polling interval in seconds


# ── Static IP / Network Configuration ────────────────────────────────────────
network_interface: "ens192"                       # CHANGE ME - typical ESX vmxnet3 iface
network_ip_address: "10.0.1.50"                   # CHANGE ME
network_prefix: 24                                # CIDR prefix length
network_gateway: "10.0.1.1"                       # CHANGE ME
network_dns_servers:
  - "10.0.1.2"                                    # CHANGE ME
  - "10.0.1.3"                                    # CHANGE ME
network_dns_search:
  - "example.com"                                 # CHANGE ME
network_connection_name: "static-{{ network_interface }}"


# ── InCommon SSL Certificates ────────────────────────────────────────────────
# Source directory on the ANSIBLE CONTROLLER containing the PEM files.
# The role will scan this directory, auto-detect the server cert, any
# intermediate/chain certs, and the private key, then deploy them.
cert_source_dir: "/path/to/incommon-certs"        # CHANGE ME

# Destination paths on the target host (defaults match RHEL conventions)
cert_dest_dir: "/etc/pki/tls/certs"
cert_key_dest_dir: "/etc/pki/tls/private"
cert_ca_bundle_dir: "/etc/pki/ca-trust/source/anchors"
cert_gitlab_runner_ssl_dir: "/etc/gitlab-runner/certs"

# File-detection patterns (adjust only if your filenames differ significantly)
# The certificate role auto-detects files by inspecting PEM content, so
# these are fallback glob hints for edge cases.
cert_key_patterns:
  - "*.key"
  - "*-key.pem"
cert_server_cert_patterns:
  - "*.crt"
  - "*-cert.pem"
cert_chain_patterns:
  - "*chain*.pem"
  - "*intermediate*.crt"
  - "*incommon*.crt"
  - "*bundle*.crt"


# ── Firewall ─────────────────────────────────────────────────────────────────
firewall_allowed_ports:
  - { port: "22/tcp",   comment: "SSH" }
  - { port: "443/tcp",  comment: "HTTPS outbound to GitLab (implicit via masquerade, listed for doc)" }
firewall_zone: "public"


# ── SELinux ──────────────────────────────────────────────────────────────────
selinux_mode: "enforcing"                         # enforcing | permissive
selinux_policy: "targeted"


# ── Docker ───────────────────────────────────────────────────────────────────
docker_edition: "ce"                              # ce | ee
docker_storage_driver: "overlay2"
docker_log_driver: "json-file"
docker_log_max_size: "50m"
docker_log_max_file: "3"


# ── Log Rotation ─────────────────────────────────────────────────────────────
logrotate_gitlab_runner_frequency: "weekly"
logrotate_gitlab_runner_rotate_count: 12
logrotate_gitlab_runner_max_size: "100M"
